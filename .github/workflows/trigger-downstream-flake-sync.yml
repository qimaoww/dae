---
name: Trigger downstream sync workflow

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  DOWNSTREAM_REPO: flake.nix
  WORKFLOW_FILE: sync-upstream.yml

jobs:
  dispatch-downstream-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Check downstream sync secrets
        id: check_secrets
        env:
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
        run: |
          if [ -n "$GH_APP_ID" ] && [ -n "$GH_APP_PRIVATE_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping downstream sync because GH_APP_ID/GH_APP_PRIVATE_KEY are not configured." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Generate GitHub auth token
        if: ${{ steps.check_secrets.outputs.ready == 'true' }}
        # https://github.com/tibdex/github-app-token
        id: generate_token
        uses: tibdex/github-app-token@v2.1.0
        with:
          app_id: ${{ secrets.GH_APP_ID }}
          private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Dispatch
        if: ${{ steps.check_secrets.outputs.ready == 'true' }}
        uses: convictional/trigger-workflow-and-wait@v1.6.5
        with:
          owner: ${{ github.repository_owner }}
          repo: ${{ env.DOWNSTREAM_REPO }}
          github_token: ${{ steps.generate_token.outputs.token }}
          workflow_file_name: ${{ env.WORKFLOW_FILE }}
          ref: main
          client_payload: '{"project":"dae"}'
          trigger_workflow: true
          propagate_failure: false
          wait_workflow: false
